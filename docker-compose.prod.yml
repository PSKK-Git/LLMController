services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llmcontroller
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7

  app:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://llm:llm@postgres:5432/llmcontroller
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
