<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLMController</title>
<style>
  :root { --bg:#0f1115; --panel:#1a1d24; --border:#2a2f3a; --text:#e6e8ec; --muted:#8b92a1; --accent:#5b8cff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; }
  /* Sidebar */
  .sidebar { width:240px; background:#13161c; border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .sidebar h2 { font-size:13px; color:var(--muted); margin:14px 14px 8px; text-transform:uppercase; letter-spacing:.05em; }
  #newChat { margin:8px 12px; padding:9px; background:var(--accent); color:#fff; border:0; border-radius:8px; font-weight:600; cursor:pointer; }
  .sessions { flex:1; overflow-y:auto; padding:4px 8px; }
  .sess { display:flex; align-items:center; gap:6px; padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); }
  .sess:hover { background:#1d212b; }
  .sess.active { background:#222838; }
  .sess .title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sess .del { color:var(--muted); border:0; background:none; cursor:pointer; font-size:14px; }
  /* Main */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar { display:flex; gap:10px; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); }
  .topbar input, .topbar select { background:#0f1115; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:8px; font-size:13px; }
  #key { flex:1; }
  .msgs { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:12px; }
  .msg { padding:10px 13px; border-radius:10px; font-size:14px; white-space:pre-wrap; line-height:1.5; max-width:80%; }
  .user { background:#222838; align-self:flex-end; }
  .assistant { background:#161b27; border:1px solid var(--border); align-self:flex-start; }
  .meta { font-size:11px; color:var(--muted); margin-top:5px; }
  .composer { display:flex; gap:10px; padding:12px 16px; border-top:1px solid var(--border); }
  #prompt { flex:1; background:#0f1115; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; font-size:14px; resize:none; min-height:44px; max-height:160px; }
  #send { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:0 20px; font-weight:600; cursor:pointer; }
  #send:disabled { opacity:.5; }
  .err { color:#ff6b6b; font-size:13px; padding:0 16px 8px; }
  details { margin:8px 12px; }
  details summary { cursor:pointer; color:var(--muted); font-size:12px; }
  .mini { font-size:12px; }
  .mini input { width:100%; margin-top:6px; }
  .mini button { margin-top:6px; width:100%; padding:7px; background:#2a2f3a; color:#fff; border:0; border-radius:6px; cursor:pointer; }
  .empty { color:var(--muted); text-align:center; margin-top:40px; font-size:14px; }
</style>
</head>
<body>
  <div class="sidebar">
    <h2>LLMController</h2>
    <button id="newChat">+ New chat</button>
    <div class="sessions" id="sessions"></div>
    <details>
      <summary>Generate a gateway key (admin)</summary>
      <div class="mini">
        <input id="adminToken" type="password" placeholder="admin token" autocomplete="off" />
        <button id="genBtn">Generate &amp; use key</button>
        <div id="genOut" style="margin-top:6px;color:var(--muted)"></div>
      </div>
    </details>
  </div>

  <div class="main">
    <div class="topbar">
      <input id="key" type="password" placeholder="Gateway API key (sk-...)" autocomplete="off" />
      <select id="model">
        <option value="mistral-small-latest" selected>mistral-small-latest</option>
        <option value="mistral-large-latest">mistral-large-latest</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="claude-3-sonnet">claude-3-sonnet</option>
      </select>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="err" id="err"></div>
    <div class="composer">
      <textarea id="prompt" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="send">Send</button>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const LS = { sessions: "llmc_sessions", current: "llmc_current", key: "llmc_key", model: "llmc_model" };

let sessions = JSON.parse(localStorage.getItem(LS.sessions) || "[]");
let currentId = localStorage.getItem(LS.current);

function save() {
  localStorage.setItem(LS.sessions, JSON.stringify(sessions));
  localStorage.setItem(LS.current, currentId);
}
function current() { return sessions.find(s => s.id === currentId); }

function newSession() {
  const s = { id: String(Date.now()), title: "New chat", messages: [] };
  sessions.unshift(s);
  currentId = s.id;
  save(); render();
}
function deleteSession(id, ev) {
  ev.stopPropagation();
  sessions = sessions.filter(s => s.id !== id);
  if (currentId === id) currentId = sessions[0]?.id || null;
  if (!sessions.length) newSession(); else { save(); render(); }
}
function switchSession(id) { currentId = id; save(); render(); }

function renderSidebar() {
  const box = $("sessions"); box.innerHTML = "";
  for (const s of sessions) {
    const div = document.createElement("div");
    div.className = "sess" + (s.id === currentId ? " active" : "");
    div.onclick = () => switchSession(s.id);
    div.innerHTML = `<span class="title"></span><button class="del">&times;</button>`;
    div.querySelector(".title").textContent = s.title;
    div.querySelector(".del").onclick = (e) => deleteSession(s.id, e);
    box.appendChild(div);
  }
}
function renderMessages() {
  const box = $("msgs"); box.innerHTML = "";
  const s = current();
  if (!s || !s.messages.length) {
    box.innerHTML = '<div class="empty">Start the conversation — this session keeps full context.</div>';
    return;
  }
  for (const m of s.messages) {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.textContent = m.content;
    if (m.meta) { const e = document.createElement("div"); e.className = "meta"; e.textContent = m.meta; div.appendChild(e); }
    box.appendChild(div);
  }
  box.scrollTop = box.scrollHeight;
}
function render() { renderSidebar(); renderMessages(); }

async function send() {
  const key = $("key").value.trim();
  const model = $("model").value;
  const text = $("prompt").value.trim();
  $("err").textContent = "";
  if (!key) { $("err").textContent = "Enter a gateway API key (or generate one in the sidebar)."; return; }
  if (!text) return;
  localStorage.setItem(LS.key, key); localStorage.setItem(LS.model, model);

  const s = current();
  s.messages.push({ role: "user", content: text });
  if (s.title === "New chat") s.title = text.slice(0, 40);
  $("prompt").value = "";
  save(); render();
  $("send").disabled = true;

  try {
    // send the FULL conversation history -> real multi-turn context
    const payload = { model, messages: s.messages.map(m => ({ role: m.role, content: m.content })) };
    const resp = await fetch("/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const d = await resp.json().catch(() => ({}));
      $("err").textContent = "Error " + resp.status + ": " + (d.detail || resp.statusText);
      return;
    }
    const data = await resp.json();
    const cost = resp.headers.get("X-Cost-This-Request");
    const u = data.usage || {};
    const meta = `${data.model} | ${u.total_tokens ?? "?"} tokens` + (cost ? ` | $${cost}` : "");
    s.messages.push({ role: "assistant", content: data.choices[0].message.content, meta });
    save(); render();
  } catch (e) {
    $("err").textContent = "Request failed: " + e.message;
  } finally {
    $("send").disabled = false;
  }
}

async function genKey() {
  const adminToken = $("adminToken").value.trim();
  $("genOut").textContent = "";
  if (!adminToken) { $("genOut").textContent = "Enter the admin token."; return; }
  try {
    const h = { "X-Admin-Token": adminToken, "Content-Type": "application/json" };
    const o = await fetch("/admin/organizations", { method: "POST", headers: h, body: JSON.stringify({ name: "ui" }) });
    if (!o.ok) { $("genOut").textContent = "Org failed: " + o.status; return; }
    const org = await o.json();
    const k = await fetch("/admin/api-keys", { method: "POST", headers: h, body: JSON.stringify({ org_id: org.org_id, name: "ui" }) });
    if (!k.ok) { $("genOut").textContent = "Key failed: " + k.status; return; }
    const key = (await k.json()).api_key;
    $("key").value = key; localStorage.setItem(LS.key, key);
    $("genOut").textContent = "Key created and filled in.";
  } catch (e) { $("genOut").textContent = "Failed: " + e.message; }
}

// init
$("key").value = localStorage.getItem(LS.key) || "";
const savedModel = localStorage.getItem(LS.model);
if (savedModel) $("model").value = savedModel;
$("newChat").onclick = newSession;
$("send").onclick = send;
$("genBtn").onclick = genKey;
$("prompt").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
if (!sessions.length) newSession(); else { if (!current()) currentId = sessions[0].id; render(); }
</script>
</body>
</html>
